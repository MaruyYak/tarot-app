<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <defs>
    <pattern id="tile" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">

      <!-- Outer diamond -->
      <path d="M40 3 L77 40 L40 77 L3 40 Z"
        fill="none" stroke="rgba(180,148,90,0.22)" stroke-width="0.9"/>

      <!-- Inner diamond -->
      <path d="M40 18 L62 40 L40 62 L18 40 Z"
        fill="none" stroke="rgba(180,148,90,0.12)" stroke-width="0.5"/>

      <!-- Stem lines: inner → outer diamond tips -->
      <line x1="40" y1="18" x2="40" y2="3"  stroke="rgba(180,148,90,0.14)" stroke-width="0.5"/>
      <line x1="62" y1="40" x2="77" y2="40" stroke="rgba(180,148,90,0.14)" stroke-width="0.5"/>
      <line x1="40" y1="62" x2="40" y2="77" stroke="rgba(180,148,90,0.14)" stroke-width="0.5"/>
      <line x1="18" y1="40" x2="3"  y2="40" stroke="rgba(180,148,90,0.14)" stroke-width="0.5"/>

      <!-- Curved vine arcs inside the diamond -->
      <path d="M18 40 C22 28 28 22 40 18" stroke="rgba(180,148,90,0.09)" stroke-width="0.6" fill="none"/>
      <path d="M40 18 C52 22 58 28 62 40" stroke="rgba(180,148,90,0.09)" stroke-width="0.6" fill="none"/>
      <path d="M62 40 C58 52 52 58 40 62" stroke="rgba(180,148,90,0.09)" stroke-width="0.6" fill="none"/>
      <path d="M40 62 C28 58 22 52 18 40" stroke="rgba(180,148,90,0.09)" stroke-width="0.6" fill="none"/>

      <!-- 4-petal flower at center (rose petals) -->
      <ellipse cx="40" cy="31.5" rx="3.5" ry="7.5" fill="rgba(196,118,138,0.17)"/>
      <ellipse cx="40" cy="31.5" rx="3.5" ry="7.5" fill="rgba(196,118,138,0.17)" transform="rotate(180 40 40)"/>
      <ellipse cx="40" cy="31.5" rx="3.5" ry="7.5" fill="rgba(196,118,138,0.17)" transform="rotate(90 40 40)"/>
      <ellipse cx="40" cy="31.5" rx="3.5" ry="7.5" fill="rgba(196,118,138,0.17)" transform="rotate(270 40 40)"/>

      <!-- Diagonal petals (gold) -->
      <ellipse cx="40" cy="32.5" rx="2.5" ry="6" fill="rgba(201,160,96,0.11)" transform="rotate(45 40 40)"/>
      <ellipse cx="40" cy="32.5" rx="2.5" ry="6" fill="rgba(201,160,96,0.11)" transform="rotate(135 40 40)"/>
      <ellipse cx="40" cy="32.5" rx="2.5" ry="6" fill="rgba(201,160,96,0.11)" transform="rotate(225 40 40)"/>
      <ellipse cx="40" cy="32.5" rx="2.5" ry="6" fill="rgba(201,160,96,0.11)" transform="rotate(315 40 40)"/>

      <!-- Center gem -->
      <circle cx="40" cy="40" r="3.2" fill="rgba(201,160,96,0.22)"/>
      <circle cx="40" cy="40" r="1.8" fill="rgba(196,118,138,0.30)"/>
      <circle cx="40" cy="40" r="0.8" fill="rgba(255,220,180,0.40)"/>

      <!-- Outer diamond tip ornaments -->
      <circle cx="40" cy="3"  r="2.2" fill="rgba(180,148,90,0.20)"/>
      <circle cx="40" cy="3"  r="1.0" fill="rgba(201,160,96,0.35)"/>
      <circle cx="77" cy="40" r="2.2" fill="rgba(180,148,90,0.20)"/>
      <circle cx="77" cy="40" r="1.0" fill="rgba(201,160,96,0.35)"/>
      <circle cx="40" cy="77" r="2.2" fill="rgba(180,148,90,0.20)"/>
      <circle cx="40" cy="77" r="1.0" fill="rgba(201,160,96,0.35)"/>
      <circle cx="3"  cy="40" r="2.2" fill="rgba(180,148,90,0.20)"/>
      <circle cx="3"  cy="40" r="1.0" fill="rgba(201,160,96,0.35)"/>

      <!-- Corner tile joints (where tiles meet) -->
      <circle cx="0"  cy="0"  r="2.8" fill="rgba(180,148,90,0.16)"/>
      <circle cx="80" cy="0"  r="2.8" fill="rgba(180,148,90,0.16)"/>
      <circle cx="0"  cy="80" r="2.8" fill="rgba(180,148,90,0.16)"/>
      <circle cx="80" cy="80" r="2.8" fill="rgba(180,148,90,0.16)"/>

      <!-- Tiny leaf buds at inner diamond corners -->
      <circle cx="40" cy="18" r="1.4" fill="rgba(196,118,138,0.20)"/>
      <circle cx="62" cy="40" r="1.4" fill="rgba(196,118,138,0.20)"/>
      <circle cx="40" cy="62" r="1.4" fill="rgba(196,118,138,0.20)"/>
      <circle cx="18" cy="40" r="1.4" fill="rgba(196,118,138,0.20)"/>

    </pattern>
  </defs>
  <rect width="80" height="80" fill="url(#tile)"/>
</svg>
